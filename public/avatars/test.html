<!DOCTYPE html>
<html>
<head>

      border: 3px solid red;
      width: 250px;

    }
    .avatar-container img {
      width: 100%;
      height: 100%;
      display: block;

</head>
<body>

  <div class="avatar-container">
    <img src="avatar2.svg" />
  </div>
</body>
</html>
